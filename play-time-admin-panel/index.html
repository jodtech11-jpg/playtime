    <script>
      // Apply dark theme immediately to prevent flash - must run before body renders
      (function() {
        var theme = localStorage.getItem('theme');
        var isDark = theme === 'dark' || (!theme && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', isDark);
      })();
    </script>

    <script>
      // Initialize console filters immediately, before any modules load
      // This must run as early as possible to catch all console messages
      (function() {
        // Store original console methods before any libraries override them
        const originalError = console.error;
        const originalWarn = console.warn;
        const originalLog = console.log;
        const originalInfo = console.info;
        const originalDebug = console.debug;
          
          const shouldFilter = function(args) {
            if (!args || args.length === 0) return false;
            
            // Quick check on first argument (most common case) - faster filtering
            if (args[0] && typeof args[0] === 'string') {
              const firstArg = args[0].toLowerCase();
              if (firstArg.includes('react devtools') || 
                  firstArg.includes('react-devtools') ||
                  firstArg.includes('cispl') ||
                  firstArg.includes('signerdigital') ||
                  firstArg.includes('content.js') ||
                  firstArg.includes('better development experience') ||
                  firstArg.includes('download the react')) {
                return true;
              }
            }
            
            // Convert arguments object to array for full message check
            const argsArray = Array.prototype.slice.call(args);
            const fullMessage = argsArray.map(function(arg) {
              try {
                if (typeof arg === 'string') return arg;
                if (typeof arg === 'object' && arg !== null) {
                  return JSON.stringify(arg);
                }
                return String(arg);
              } catch (e) {
                return String(arg);
              }
            }).join(' ').toLowerCase();
            
            // Filter patterns - comprehensive list
            const filterPatterns = [
              'heartbeats undefined',
              'heartbeatservice',
              'download the react devtools',
              'react.dev/link/react-devtools',
              'react devtools',
              'react-devtools',
              'react devtools for a better',
              'cispl signerdigital',
              'cispl',
              'signerdigital',
              'content.js',
              'service worker registered successfully',
              'react-dom_client.js',
              'better development experience',
              'devtools extension',
              'download the react'
            ];
            
            // Check if any pattern matches
            for (let i = 0; i < filterPatterns.length; i++) {
              if (fullMessage.includes(filterPatterns[i])) {
                return true;
              }
            }
            
            return false;
          };
          
          console.error = function() {
            if (!shouldFilter(arguments)) {
              originalError.apply(console, arguments);
            }
          };
          
          console.warn = function() {
            if (!shouldFilter(arguments)) {
              originalWarn.apply(console, arguments);
            }
          };
          
          console.log = function() {
            if (!shouldFilter(arguments)) {
              originalLog.apply(console, arguments);
            }
          };
          
          // Also filter console.info and console.debug
          console.info = function() {
            if (!shouldFilter(arguments)) {
              originalInfo.apply(console, arguments);
            }
          };
          
          console.debug = function() {
            if (!shouldFilter(arguments)) {
              originalDebug.apply(console, arguments);
            }
          };
      })();
    </script>
